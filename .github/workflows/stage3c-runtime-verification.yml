name: Stage 3C Runtime Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/lib/offline-payments.functions.ts"
      - "src/components/billing/OfflinePaymentSubmitCard.tsx"
      - "src/routes/_society/society.payments.tsx"
      - "supabase/migrations/**"
      - "tests/**"
      - ".github/workflows/stage3c-runtime-verification.yml"
      - "package.json"
      - "bun.lock"
  push:
    branches: [main]
    paths:
      - "src/lib/offline-payments.functions.ts"
      - "supabase/migrations/**"
      - "tests/**"
      - ".github/workflows/stage3c-runtime-verification.yml"
      - "package.json"
      - "bun.lock"

jobs:
  runtime:
    name: Isolated Supabase + Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        id: setup_bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify Bun and lockfile compatibility
        id: bun_preflight
        run: |
          set -euo pipefail
          echo "Bun version:"
          bun --version
          test -f bun.lock
          head -n 8 bun.lock
          node - <<'NODE'
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          if (!pkg.packageManager || !pkg.packageManager.startsWith("bun@")) {
            console.error("package.json packageManager is missing or not bun@");
            process.exit(1);
          }
          console.log("packageManager:", pkg.packageManager);
          NODE

      - name: Install dependencies
        id: install
        run: bun install --frozen-lockfile

      - name: Assert dependency install changed no manifest files
        run: |
          set -euo pipefail
          git diff --exit-code -- package.json bun.lock

      - name: Create report directories
        run: mkdir -p reports test-results playwright-report diagnostics

      - name: Docker preflight
        id: docker_preflight
        run: |
          set -euo pipefail
          docker version
          docker info
          docker ps

      - name: Setup Supabase CLI
        id: supabase_cli
        uses: supabase/setup-cli@v1
        with:
          version: "1.219.2"

      - name: Verify Supabase CLI
        if: ${{ steps.supabase_cli.outcome == 'success' }}
        run: |
          set -euo pipefail
          command -v supabase
          supabase --version

      - name: Start disposable local Supabase
        id: supabase_start
        if: ${{ steps.supabase_cli.outcome == 'success' }}
        run: |
          set -eo pipefail
          supabase start --debug 2>&1 | tee diagnostics/supabase-start.log

      - name: Reset database (apply all migrations)
        if: ${{ steps.supabase_start.outcome == 'success' }}
        run: supabase db reset --no-seed

      - name: Export local Supabase env
        id: supabase_env
        if: ${{ steps.supabase_start.outcome == 'success' }}
        run: |
          set -eo pipefail
          supabase status -o env > .supabase.env
          # shellcheck disable=SC1091
          set -a; . ./.supabase.env; set +a
          : "${API_URL:?API_URL missing from supabase status}"
          : "${SERVICE_ROLE_KEY:?SERVICE_ROLE_KEY missing from supabase status}"
          : "${ANON_KEY:?ANON_KEY missing from supabase status}"
          case "$API_URL" in
            http://127.0.0.1:*|http://localhost:*) : ok ;;
            *) echo "Refusing to proceed: API_URL is not local ($API_URL)"; exit 1 ;;
          esac
          echo "::add-mask::${SERVICE_ROLE_KEY}"
          echo "::add-mask::${ANON_KEY}"
          {
            echo "SOCIOHUB_TEST_SUPABASE_URL=${API_URL}"
            echo "SOCIOHUB_TEST_SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "SOCIOHUB_TEST_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}"
            echo "ALLOW_SOCIOHUB_LIVE_STAGE3C=true"
            echo "VITE_SUPABASE_URL=${API_URL}"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}"
          } >> "$GITHUB_ENV"
          rm -f .supabase.env

      - name: Validate Stage 3C core live source (pre-flight)
        run: bun scripts/verify-stage3c-live-core-source.ts

      - name: Application-boundary unit tests
        run: bunx vitest run tests/unit/billing-stage3c-application-boundary.test.ts --reporter=default

      - name: Unit tests
        run: bunx vitest run tests/unit --reporter=default --reporter=json --outputFile=reports/unit.json

      - name: Stage 3C live integration (must not skip)
        id: live_tests
        if: ${{ steps.supabase_env.outcome == 'success' }}
        run: |
          bunx vitest run tests/integration/billing-stage3c-live.test.ts \
            --reporter=default --reporter=json --outputFile=reports/live.json

      - name: Validate Stage 3C core live matrix (24/93)
        if: ${{ steps.live_tests.outcome == 'success' || steps.live_tests.outcome == 'failure' }}
        run: bun scripts/verify-stage3c-live-core-report.ts reports/live.json


      - name: Full vitest run (excluding live suite to avoid double-execution)
        run: |
          bunx vitest run --exclude 'tests/integration/billing-stage3c-live.test.ts' \
            --reporter=default --reporter=json --outputFile=reports/full.json

      - name: Typecheck
        run: bunx tsgo --noEmit

      - name: Build app
        run: bun run build

      - name: Client bundle secret scan
        run: bun scripts/verify-client-bundle-secrets.ts

      - name: Protected society ID source scan (MANDATORY)
        env:
          SOCIOHUB_PROTECTED_SOCIETY_ID: ${{ secrets.SOCIOHUB_PROTECTED_SOCIETY_ID }}
        run: |
          if [ -z "$SOCIOHUB_PROTECTED_SOCIETY_ID" ]; then
            echo "Required SOCIOHUB_PROTECTED_SOCIETY_ID secret is missing"
            exit 1
          fi
          echo "::add-mask::$SOCIOHUB_PROTECTED_SOCIETY_ID"
          if grep -R -F --exclude-dir=node_modules --exclude-dir=.git \
               --include='*.ts' --include='*.tsx' --include='*.sql' --include='*.yml' --include='*.yaml' \
               "$SOCIOHUB_PROTECTED_SOCIETY_ID" src tests supabase/migrations .github > /dev/null; then
            echo "Protected society ID found in committed files"
            exit 1
          fi
          echo "Protected ID not present in committed source."

      - name: Install Playwright browsers
        id: playwright_install
        if: ${{ steps.supabase_env.outcome == 'success' }}
        run: bunx playwright install --with-deps chromium

      - name: Start app for Playwright
        id: app_start
        if: ${{ steps.playwright_install.outcome == 'success' }}
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          nohup bun run dev -- --port 3000 --host 127.0.0.1 > app.log 2>&1 &
          echo $! > .app.pid
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3000 > /dev/null; then
              echo "App up on 3000"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start; last log:"
          tail -n 200 app.log || true
          exit 1

      - name: Playwright — Stage 3C authenticated (390 + 1280)
        id: playwright
        if: ${{ steps.app_start.outcome == 'success' }}
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: bunx playwright test --config=playwright.config.ts

      - name: Assert Playwright required titles executed and passed
        if: ${{ always() && steps.playwright.outcome != 'skipped' }}
        run: |
          node -e '
            const fs = require("fs");
            const p = "reports/playwright.json";
            if (!fs.existsSync(p)) { console.error("playwright.json missing"); process.exit(1); }
            const r = JSON.parse(fs.readFileSync(p, "utf8"));
            const REQUIRED = [
              "admin-payment-form",
              "admin-pending-state",
              "admin-verification",
              "resident-bank-transfer",
              "resident-pending-state",
              "resident-valid-receipt",
              "resident-void-receipt",
            ];
            const PROJECTS = ["mobile-390", "desktop-1280"];
            const seen = {};
            REQUIRED.forEach(t => { seen[t] = {}; });
            const walk = (s) => {
              (s.suites||[]).forEach(walk);
              (s.specs||[]).forEach(sp => {
                (sp.tests||[]).forEach(t => {
                  const title = sp.title;
                  if (!REQUIRED.includes(title)) return;
                  const proj = t.projectName;
                  const results = t.results || [];
                  const last = results[results.length - 1];
                  const status = last ? last.status : "missing";
                  seen[title][proj] = status;
                });
              });
            };
            (r.suites||[]).forEach(walk);
            let failed = false;
            for (const title of REQUIRED) {
              for (const proj of PROJECTS) {
                const s = seen[title][proj];
                if (s === "passed" || s === "expected") continue;
                console.error("FAIL: title="+title+" project="+proj+" status="+(s||"absent"));
                failed = true;
              }
            }
            console.log("Playwright title/project matrix:", JSON.stringify(seen, null, 2));
            if (failed) process.exit(1);
          '

      - name: Collect Supabase diagnostics on failure
        if: ${{ failure() && steps.supabase_cli.outcome == 'success' }}
        run: |
          supabase status > diagnostics/supabase-status.txt 2>&1 || true
          docker ps -a > diagnostics/docker-ps.txt 2>&1 || true
          docker system df > diagnostics/docker-df.txt 2>&1 || true
          for c in $(docker ps -a --format '{{.Names}}' | grep -i supabase || true); do
            docker logs "$c" > "diagnostics/${c}.log" 2>&1 || true
          done

      - name: Upload Supabase diagnostics
        if: ${{ always() && steps.supabase_cli.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: stage3c-supabase-diagnostics
          path: diagnostics/
          if-no-files-found: ignore

      - name: Upload app log
        if: ${{ always() && steps.app_start.outcome != 'skipped' }}
        uses: actions/upload-artifact@v4
        with:
          name: stage3c-app-log
          path: app.log
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3c-reports
          path: |
            reports/
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Stop app
        if: ${{ always() && steps.app_start.outcome != 'skipped' }}
        run: |
          if [ -f .app.pid ]; then
            PID="$(cat .app.pid)"
            if kill -0 "$PID" 2>/dev/null; then kill "$PID" || true; fi
          fi

      - name: Stop local Supabase
        if: ${{ always() && steps.supabase_cli.outcome == 'success' }}
        run: |
          if command -v supabase >/dev/null 2>&1; then
            supabase stop --no-backup || true
          else
            echo "Supabase CLI was not installed; nothing to stop."
          fi
